name: Deploy Website

on:
  # Rebuild when pushing to main
  push:
    branches: [main]

  # Rebuild when triggered by the main repo's release workflow
  repository_dispatch:
    types: [new-release]

  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Trigger Vercel production deployment via Deploy Hook
      # Create a Deploy Hook in Vercel project settings and save the URL
      # as VERCEL_DEPLOY_HOOK secret in this repo's GitHub settings
      - name: Trigger Vercel deployment
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Vercel deployment triggered via deploy hook"
          else
            echo "::warning::VERCEL_DEPLOY_HOOK secret not set — relying on Vercel GitHub integration"
          fi
