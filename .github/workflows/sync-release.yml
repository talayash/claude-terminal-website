name: Sync Release Data

# This workflow can be triggered from the main claude-terminal repo
# Add this step to your release.yml:
#
#   - name: Trigger website rebuild
#     uses: peter-evans/repository-dispatch@v3
#     with:
#       token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
#       repository: talayash/claude-terminal-website
#       event-type: new-release
#
# You'll need a PAT with repo scope stored as WEBSITE_DISPATCH_TOKEN

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest changelog from main repo
        run: |
          curl -sL https://raw.githubusercontent.com/talayash/claude-terminal/master/src/changelog.json \
            -o src/data/changelog.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated changelog
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/changelog.json
          git commit -m "chore: sync changelog from main repo"
          git push
